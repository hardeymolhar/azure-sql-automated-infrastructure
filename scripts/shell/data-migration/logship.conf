# ============================================
# SQL Server Transactional Replication Config
# ============================================

# --------------------------------------------
# Core SQL Server Instances
# --------------------------------------------

# Distributor SQL Server
REPL_DISTRIBUTOR=CONTOSO-SRV

# Publisher SQL Server
REPL_PUBLISHER=CONTOSO-SRV

# Azure SQL Subscriber
REPL_SUBSCRIBER=contoso.database.windows.net


# --------------------------------------------
# Databases
# --------------------------------------------

# Source database
REPL_SOURCE_DB=AdventureWorks

# Distribution database
REPL_DISTRIBUTION_DB=distribution

# Destination Azure SQL database
REPL_DESTINATION_DB=my-db


# --------------------------------------------
# Publication
# --------------------------------------------

# Transactional publication name
REPL_PUBLICATION=REPL-AdventureWorks

# Published article/table
REPL_ARTICLE=Person


# --------------------------------------------
# Authentication
# --------------------------------------------

# Publisher SQL Login
REPL_PUBLISHER_LOGIN=sqladmin
REPL_PUBLISHER_PASSWORD=<pwd>

# Subscriber SQL Login
REPL_SUBSCRIBER_LOGIN=sqladmin
REPL_SUBSCRIBER_PASSWORD=<pwd>


# --------------------------------------------
# Replication Paths
# --------------------------------------------

# Replication working directory
REPL_WORKING_DIRECTORY=C:\REPL

# Snapshot folder
REPL_SNAPSHOT_FOLDER=C:\REPL

# Distribution database files
REPL_DATA_FOLDER=C:\Program Files\Microsoft SQL Server\MSSQL16.MSSQLSERVER\MSSQL\Data


# --------------------------------------------
# Retention Settings
# Leave values unchanged unless required
# --------------------------------------------

REPL_MIN_RETENTION=0
REPL_MAX_RETENTION=72
REPL_HISTORY_RETENTION=48


# --------------------------------------------
# Cleanup Batch Settings
# Leave values unchanged unless tuning
# --------------------------------------------

REPL_DELETE_XACT_BATCH=5000
REPL_DELETE_CMD_BATCH=2000