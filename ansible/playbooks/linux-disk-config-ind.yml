---
- name: Configure Linux DB Disks (Dynamic + Idempotent)
  hosts: linux_vm
  become: true

  vars:
    data_mount_points: ["/u02", "/u03"]
    log_mount_points: ["/u04", "/u05"]
    force_wipe: false  # Set to true only if you want to override safeguards

  tasks:
    - name: Pre-flight safeguards
      block:
        - name: Check if disks already have filesystems
          shell: |
            blkid /dev/{{ item.name }} 2>/dev/null | grep -o 'TYPE="[^"]*"' || echo "TYPE=\"none\""
          register: blkid_check
          loop: "{{ disks | default([]) }}"
          changed_when: false
          when: disk_list.stdout_lines | length > 0

        - name: Warn about existing filesystems
          debug:
            msg: "WARNING: /dev/{{ item.item.name }} already has a filesystem. Set force_wipe=true to override."
          loop: "{{ blkid_check.results }}"
          when: 
            - blkid_check.results is defined
            - "'xfs' in item.stdout or 'ext4' in item.stdout"

        - name: Fail if existing filesystem and force_wipe not set
          fail:
            msg: "Existing filesystem detected on disk. Set force_wipe=true to proceed."
          when:
            - not force_wipe | bool
            - blkid_check.results is defined
            - "'xfs' in item.stdout or 'ext4' in item.stdout"
          loop: "{{ blkid_check.results }}"

    - name: Install required packages
      package:
        name: 
          - xfsprogs
          - util-linux
          - e2fsprogs-libs
        state: present

    - name: Get Azure attached disks
      shell: |
        lsblk -b -d -n -o NAME,SIZE | tail -n +2 | awk '{print $1, $2}' | head -4
      register: disk_list
      changed_when: false

    - name: Parse disk mapping
      set_fact:
        disks: "{{ disks | default([]) + [{'name': item.split()[0], 'size': item.split()[1] | int}] }}"
      loop: "{{ disk_list.stdout_lines }}"
      when: disk_list.stdout_lines | length > 0

    - name: Backup /etc/fstab
      copy:
        src: /etc/fstab
        dest: "/etc/fstab.backup.{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: yes
      when: ansible_user_id | int == 0

    - name: Partition and format data disks
      block:
        - name: Check partition existence (idempotent check)
          stat:
            path: "/dev/{{ item.name }}1"
          register: partition_stat
          loop: "{{ disks[:2] }}"

        - name: Wipe existing partitions from disks
          shell: |
            wipefs -a /dev/{{ item.item.name }} || true
          loop: "{{ partition_stat.results }}"
          when: 
            - item.stat.exists
            - force_wipe | bool
          changed_when: false

        - name: Unmount any existing partitions (force)
          shell: |
            umount -l /dev/{{ item.item.name }}1 2>/dev/null || true
            umount -l /dev/{{ item.item.name }}2 2>/dev/null || true
            umount -l /dev/{{ item.item.name }} 2>/dev/null || true
          loop: "{{ partition_stat.results }}"
          when: item.stat.exists
          changed_when: false

        - name: Create GPT partition table
          community.general.parted:
            device: "/dev/{{ item.item.name }}"
            label: gpt
            number: 1
            state: present
            part_type: primary
            fs_type: xfs
          loop: "{{ partition_stat.results }}"
          when: not item.stat.exists

        - name: Check filesystem type (idempotency)
          shell: |
            blkid -s TYPE -o value /dev/{{ item.name }}1 2>/dev/null || echo "none"
          register: fs_type_check
          loop: "{{ disks[:2] }}"
          changed_when: false

        - name: Create XFS filesystem only if needed
          filesystem:
            fstype: xfs
            dev: "/dev/{{ item.item.name }}1"
            force: yes
          loop: "{{ fs_type_check.results }}"
          when: item.stdout != "xfs"

        - name: Check current mount status
          shell: |
            mountpoint {{ data_mount_points[idx] }} 2>/dev/null && echo "mounted" || echo "unmounted"
          register: mount_status_data
          loop: "{{ disks[:2] }}"
          loop_control:
            index_var: idx
          changed_when: false

        - name: Mount data disks only if unmounted
          ansible.posix.mount:
            path: "{{ data_mount_points[idx] }}"
            src: "/dev/{{ item.item.name }}1"
            fstype: xfs
            opts: defaults,noatime,nodiscard
            state: mounted
            fstab: /etc/fstab
          loop: "{{ mount_status_data.results }}"
          loop_control:
            index_var: idx
          when: item.stdout == "unmounted"

    - name: Partition and format log disks
      block:
        - name: Check log partition existence
          stat:
            path: "/dev/{{ item.name }}1"
          register: log_partition_stat
          loop: "{{ disks[2:4] }}"

        - name: Create GPT partition table for log disks
          community.general.parted:
            device: "/dev/{{ item.item.name }}"
            label: gpt
            number: 1
            state: present
            part_type: primary
            fs_type: xfs
          loop: "{{ log_partition_stat.results }}"
          when: not item.stat.exists

        - name: Check log filesystem type
          shell: |
            blkid -s TYPE -o value /dev/{{ item.name }}1 2>/dev/null || echo "none"
          register: log_fs_type_check
          loop: "{{ disks[2:4] }}"
          changed_when: false

        - name: Create XFS filesystem for log disks only if needed
          filesystem:
            fstype: xfs
            dev: "/dev/{{ item.item.name }}1"
            force: yes
          loop: "{{ log_fs_type_check.results }}"
          when: item.stdout != "xfs"

        - name: Check log mount status
          shell: |
            mountpoint {{ log_mount_points[idx] }} 2>/dev/null && echo "mounted" || echo "unmounted"
          register: mount_status_log
          loop: "{{ disks[2:4] }}"
          loop_control:
            index_var: idx
          changed_when: false

        - name: Mount log disks only if unmounted
          ansible.posix.mount:
            path: "{{ log_mount_points[idx] }}"
            src: "/dev/{{ item.item.name }}1"
            fstype: xfs
            opts: defaults,noatime,nodiscard
            state: mounted
            fstab: /etc/fstab
          loop: "{{ mount_status_log.results }}"
          loop_control:
            index_var: idx
          when: item.stdout == "unmounted"

    - name: Verify mssql user exists before setting permissions
      getent:
        database: passwd
        key: mssql
      register: mssql_user_check
      failed_when: false

    - name: Set SQL Server permissions
      file:
        path: "{{ item }}"
        owner: mssql
        group: mssql
        mode: '0755'
        state: directory
      loop: "{{ data_mount_points + log_mount_points }}"
      when: 
        - ansible_user_id | int == 0
        - mssql_user_check.ansible_facts.getent_passwd.mssql is defined

    - name: Verify final configuration
      debug:
        msg: |
          Data disks configured:
          - /u02 (mounted on {{ disks[0].name }})
          - /u03 (mounted on {{ disks[1].name }})
          Log disks configured:
          - /u04 (mounted on {{ disks[2].name }})
          - /u05 (mounted on {{ disks[3].name }})