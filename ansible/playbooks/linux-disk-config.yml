---
- name: Configure Linux DB Disks (Dynamic + Idempotent)
  hosts: linux_vm
  become: true

  vars:
    data_mount_points: ["/u02", "/u03"]
    log_mount_points: ["/u04", "/u05"]

  tasks:
    - name: Install required packages
      package:
        name:
          - xfsprogs
          - util-linux
        state: present

    - name: Get Azure attached disks
      shell: |
        lsblk -b -d -n -o NAME,SIZE | tail -n +2 | awk '{print $1, $2}' | head -4
      register: disk_list
      changed_when: false

    - name: Parse disk mapping
      set_fact:
        disks: "{{ disks | default([]) + [{'name': item.split()[0], 'size': item.split()[1] | int}] }}"
      loop: "{{ disk_list.stdout_lines }}"
      when: disk_list.stdout_lines | length > 0

    - name: Partition and format data disks
      block:
        - name: Wipe existing partitions from disks
          shell: |
            wipefs -a /dev/{{ item.name }} || true
          loop: "{{ disks[:2] }}"
          changed_when: false

        - name: Unmount any existing partitions
          shell: |
            umount -l /dev/{{ item.name }}1 || true
            umount -l /dev/{{ item.name }}2 || true
            umount -l /dev/{{ item.name }} || true
          loop: "{{ disks[:2] }}"
          changed_when: false

        - name: Create GPT partition table
          community.general.parted:
            device: "/dev/{{ item.name }}"
            label: gpt
            number: 1
            state: present
            part_type: primary
            fs_type: xfs
          loop: "{{ disks[:2] }}"

        - name: Create XFS filesystem
          filesystem:
            fstype: xfs
            dev: "/dev/{{ item.name }}1"
            force: true
          loop: "{{ disks[:2] }}"

        - name: Mount data disks
          ansible.posix.mount:
            path: "{{ data_mount_points[idx] }}"
            src: "/dev/{{ item.name }}1"
            fstype: xfs
            opts: defaults,noatime,nodiscard
            state: mounted
            fstab: /etc/fstab
          loop: "{{ disks[:2] }}"
          loop_control:
            index_var: idx

    - name: Partition and format log disks
      block:
        - name: Create GPT partition table for log disks
          community.general.parted:
            device: "/dev/{{ item.name }}"
            label: gpt
            number: 1
            state: present
            part_type: primary
            fs_type: xfs
          loop: "{{ disks[2:4] }}"

        - name: Create XFS filesystem for log disks
          filesystem:
            fstype: xfs
            dev: "/dev/{{ item.name }}1"
            force: true
          loop: "{{ disks[2:4] }}"

        - name: Mount log disks
          ansible.posix.mount:
            path: "{{ log_mount_points[idx] }}"
            src: "/dev/{{ item.name }}1"
            fstype: xfs
            opts: defaults,noatime,nodiscard
            state: mounted
            fstab: /etc/fstab
          loop: "{{ disks[2:4] }}"
          loop_control:
            index_var: idx

    - name: Set SQL Server permissions
      file:
        path: "{{ item }}"
        owner: mssql
        group: mssql
        mode: "0755"
        state: directory
      loop: "{{ data_mount_points + log_mount_points }}"
      when: ansible_user_id | int == 0
