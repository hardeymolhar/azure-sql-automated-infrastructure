---
- name: Run Azure SQL .NET Workloads
  hosts: rhel_vm
  become: true

  vars:

    project_root: "{{ playbook_dir }}/../.."

    local_dotnet_scripts_dir: "{{ project_root }}/scripts/dotnet"

    remote_scripts_dir: "/usr/local/azure-sql-workloads/dotnet"

    remote_cache_dir: "/usr/local/azure-sql-workloads/cache"

    batch_insert_batches: 25

    batch_insert_delay_ms: 1000

    batch_insert_log: "{{ remote_scripts_dir }}/batch-inserts/batch-inserts.log"

    concurrency_log: "{{ remote_scripts_dir }}/concurrency/concurrency.log"

    dotnet_install_dir: "/home/sqladmin/.dotnet"

    dotnet_runtime_path: "/home/sqladmin/.dotnet:/usr/local/bin:/usr/bin:/bin"

  tasks:

    # =========================================================
    # CREATE REMOTE DIRECTORY
    # =========================================================

    - name: Create remote scripts directory
      ansible.builtin.file:
        path: "{{ remote_scripts_dir }}"
        state: directory
        owner: sqladmin
        group: sqladmin
        mode: '0755'

    - name: Create remote .NET cache directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: sqladmin
        group: sqladmin
        mode: '0755'
      loop:
        - "{{ remote_cache_dir }}"
        - "{{ remote_cache_dir }}/dotnet-cli"
        - "{{ remote_cache_dir }}/nuget"
        - "{{ remote_cache_dir }}/nuget/packages"
        - "{{ remote_cache_dir }}/nuget/http-cache"
        - "{{ remote_cache_dir }}/nuget/scratch"
        - "{{ remote_cache_dir }}/tmp"

    # =========================================================
    # CREATE MANAGED IDENTITY DIRECTORY
    # =========================================================

    - name: Create managed identity project directory
      ansible.builtin.file:
        path: "{{ remote_scripts_dir }}/managed-identity-connection"
        state: directory
        owner: sqladmin
        group: sqladmin
        mode: '0755'

    # =========================================================
    # CREATE BATCH INSERT DIRECTORY
    # =========================================================

    - name: Create batch inserts project directory
      ansible.builtin.file:
        path: "{{ remote_scripts_dir }}/batch-inserts"
        state: directory
        owner: sqladmin
        group: sqladmin
        mode: '0755'

    # =========================================================
    # CREATE HIGH CONTENTION DIRECTORY
    # =========================================================

    - name: Create high contention project directory
      ansible.builtin.file:
        path: "{{ remote_scripts_dir }}/high-contention"
        state: directory
        owner: sqladmin
        group: sqladmin
        mode: '0755'

    # =========================================================
    # UPLOAD MANAGED IDENTITY FILES
    # =========================================================

    - name: Upload managed identity Program.cs
      ansible.builtin.copy:
        src: "{{ local_dotnet_scripts_dir }}/managed-identity-connection/Program.cs"
        dest: "{{ remote_scripts_dir }}/managed-identity-connection/Program.cs"
        owner: sqladmin
        group: sqladmin
        mode: '0644'

    - name: Upload managed identity csproj
      ansible.builtin.copy:
        src: "{{ local_dotnet_scripts_dir }}/managed-identity-connection/managed-identity-connection.csproj"
        dest: "{{ remote_scripts_dir }}/managed-identity-connection/managed-identity-connection.csproj"
        owner: sqladmin
        group: sqladmin
        mode: '0644'


    # =========================================================
    # UPLOAD HIGH CONTENTION FILES
    # =========================================================

    - name: Upload high contention Program.cs
      ansible.builtin.copy:
        src: "{{ local_dotnet_scripts_dir }}/high-contention/Program.cs"
        dest: "{{ remote_scripts_dir }}/high-contention/Program.cs"
        owner: sqladmin
        group: sqladmin
        mode: '0644'

    - name: Upload high contention csproj
      ansible.builtin.copy:
        src: "{{ local_dotnet_scripts_dir }}/high-contention/contention.csproj"
        dest: "{{ remote_scripts_dir }}/high-contention/contention.csproj"
        owner: sqladmin
        group: sqladmin
        mode: '0644'


    # =========================================================
    # RUN MANAGED IDENTITY CONNECTION TEST
    # =========================================================

    - name: Run managed identity connection workload
      ansible.builtin.shell:
        cmd: |
          source ~/.bashrc
          rm -rf bin obj
          dotnet restore --force --no-cache
          dotnet build
          dotnet run
        chdir: "{{ remote_scripts_dir }}/managed-identity-connection"
        executable: /bin/bash
      become: true
      become_user: sqladmin
      environment:
        SQL_SERVER_NAME: "{{ sql_server_name }}"
        DATABASE_NAME: "{{ database_name }}"
        DOTNET_ROOT: "{{ dotnet_install_dir }}"
        DOTNET_CLI_HOME: "{{ remote_cache_dir }}/dotnet-cli"
        NUGET_PACKAGES: "{{ remote_cache_dir }}/nuget/packages"
        NUGET_HTTP_CACHE_PATH: "{{ remote_cache_dir }}/nuget/http-cache"
        NUGET_SCRATCH: "{{ remote_cache_dir }}/nuget/scratch"
        TMPDIR: "{{ remote_cache_dir }}/tmp"
        PATH: "{{ dotnet_runtime_path }}"


    # # =========================================================
    # # RUN HIGH CONTENTION WORKLOAD
    # # =========================================================

    - name: Run high contention workload
      ansible.builtin.shell: |
        source ~/.bashrc
        rm -rf bin obj

        dotnet nuget locals all --clear

        dotnet restore --force --no-cache

        dotnet build

        rm -f "{{ concurrency_log }}"

        stdbuf -oL -eL \
        dotnet run --project contention.csproj --no-build \
        2>&1 | tee "{{ concurrency_log }}"

      args:
        chdir: "{{ remote_scripts_dir }}/high-contention"
        executable: /bin/bash
      become: true
      become_user: sqladmin

      register: concurrency_output

      environment:
        SQL_SERVER_NAME: "{{ sql_server_name }}"
        DATABASE_NAME: "{{ database_name }}"
        MAX_BATCHES: "{{ batch_insert_batches }}"
        BATCH_DELAY_MS: "{{ batch_insert_delay_ms }}"
        DOTNET_ROOT: "{{ dotnet_install_dir }}"
        DOTNET_CLI_HOME: "{{ remote_cache_dir }}/dotnet-cli"
        NUGET_PACKAGES: "{{ remote_cache_dir }}/nuget/packages"
        NUGET_HTTP_CACHE_PATH: "{{ remote_cache_dir }}/nuget/http-cache"
        NUGET_SCRATCH: "{{ remote_cache_dir }}/nuget/scratch"
        TMPDIR: "{{ remote_cache_dir }}/tmp"
        PATH: "{{ dotnet_runtime_path }}"

    - name: Print concurrency workload output
      ansible.builtin.debug:
        var: concurrency_output.stdout_lines
