---
- name: Configure Linux DB Disks (Azure Managed Disks)
  hosts: linux_vm
  become: yes
  vars:
  data_mounts:
    - { device: "/dev/disk/azure/scsi1/lun0", mount: "/u02" }
    - { device: "/dev/disk/azure/scsi1/lun1", mount: "/u03" }

  log_mounts:
    - { device: "/dev/disk/azure/scsi1/lun2", mount: "/u04" }
    - { device: "/dev/disk/azure/scsi1/lun3", mount: "/u05" }

  tasks:

    - name: Install required packages
      package:
        name: xfsprogs
        state: present

    # =========================
    # DATA DISKS CONFIGURATION
    # =========================

    - name: Create partition on data disks
      community.general.parted:
        device: "{{ item.device }}"
        number: 1
        state: present
        part_type: primary
        fs_type: xfs
      loop: "{{ data_mounts }}"

    - name: Format data disks with XFS
      filesystem:
        fstype: xfs
        dev: "{{ item.device }}1"
      loop: "{{ data_mounts }}"

    - name: Create mount points for data disks
      file:
        path: "{{ item.mount }}"
        state: directory
        mode: '0755'
      loop: "{{ data_mounts }}"

    - name: Mount data disks
      mount:
        path: "{{ item.mount }}"
        src: "{{ item.device }}1"
        fstype: xfs
        opts: defaults,noatime
        state: mounted
      loop: "{{ data_mounts }}"

    # =========================
    # LOG DISKS CONFIGURATION
    # =========================

    - name: Create partition on log disks
      community.general.parted:
        device: "{{ item.device }}"
        number: 1
        state: present
        part_type: primary
        fs_type: xfs
      loop: "{{ log_mounts }}"

    - name: Format log disks with XFS
      filesystem:
        fstype: xfs
        dev: "{{ item.device }}1"
      loop: "{{ log_mounts }}"

    - name: Create mount points for log disks
      file:
        path: "{{ item.mount }}"
        state: directory
        mode: '0755'
      loop: "{{ log_mounts }}"

    - name: Mount log disks
      mount:
        path: "{{ item.mount }}"
        src: "{{ item.device }}1"
        fstype: xfs
        opts: defaults,noatime
        state: mounted
      loop: "{{ log_mounts }}"